project: ForgeBench Asset Policy

policy:
  path_categories:
    assets:
      patterns:
        - "**/*.png"
        - "**/*.jpg"
        - "**/*.jpeg"
        - "**/*.svg"
        - "**/*.ico"
        - "**/Assets.xcassets/**"
      default_severity: advisory
  suppress_findings:
    - finding_id: broad_file_surface
      when_all_changed_files_match:
        - "**/*.png"
        - "**/*.jpg"
        - "**/*.jpeg"
        - "**/*.svg"
        - "**/*.ico"
        - "**/Assets.xcassets/**"
      reason: "Asset-only large diffs should not be treated as broad code risk."
  posture_overrides:
    asset_only_changes:
      posture_ceiling: LOW_CONCERN
      reason: "Asset-only changes should not escalate above LOW_CONCERN unless a blocker is present."
